<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RootSync — Bot Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Header ──────────────────────────────────────────── */
    header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #00b87a, #00d4ff);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 14px; color: #000;
    }
    header h1 { font-size: 17px; font-weight: 600; }
    header .subtitle { font-size: 12px; color: #888; margin-top: 2px; }
    header .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555; margin-right: auto; margin-left: 0;
      transition: background 0.3s;
    }
    header .status-dot.online { background: #00b87a; box-shadow: 0 0 6px #00b87a; }

    /* ─── Config Panel ─────────────────────────────────────── */
    #config-panel {
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    #config-panel label { font-size: 12px; color: #888; white-space: nowrap; }
    #config-panel input {
      background: #222;
      border: 1px solid #333;
      border-radius: 6px;
      color: #eee;
      padding: 6px 10px;
      font-size: 12px;
      width: 340px;
    }
    #config-panel input:focus { outline: none; border-color: #00b87a; }
    #config-panel .user-field { width: 160px; }
    #test-conn-btn {
      background: #222; border: 1px solid #333; border-radius: 6px;
      color: #aaa; padding: 6px 14px; font-size: 12px; cursor: pointer;
      transition: all 0.2s;
    }
    #test-conn-btn:hover { border-color: #00b87a; color: #00b87a; }
    #conn-result { font-size: 12px; color: #666; }

    /* ─── Main Layout ──────────────────────────────────────── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ─── Chat Area ────────────────────────────────────────── */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg-row { display: flex; gap: 10px; }
    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }
    .avatar.user-av { background: #2a4a7f; }
    .avatar.bot-av  { background: linear-gradient(135deg, #00b87a, #00d4ff); color: #000; font-weight: bold; }

    .bubble {
      max-width: 65%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg-row.user .bubble {
      background: #1d4ed8;
      border-bottom-right-radius: 4px;
    }
    .msg-row.bot .bubble {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 4px;
    }
    .msg-row.system .bubble {
      background: #1a1a1a;
      border: 1px dashed #333;
      color: #888;
      font-size: 12px;
      font-style: italic;
    }
    .msg-row.system { justify-content: center; }

    .bubble .time { font-size: 10px; color: #666; margin-top: 4px; }
    .bubble .handoff-badge {
      display: inline-block;
      background: #7c3aed20;
      border: 1px solid #7c3aed;
      border-radius: 4px;
      color: #a78bfa;
      font-size: 11px;
      padding: 2px 7px;
      margin-top: 6px;
    }

    /* ─── Debug Panel ──────────────────────────────────────── */
    #debug-panel {
      width: 300px;
      background: #111;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #debug-panel h2 {
      font-size: 12px; color: #666; padding: 12px 14px;
      border-bottom: 1px solid #1e1e1e; text-transform: uppercase; letter-spacing: 1px;
    }
    #debug-content {
      flex: 1; overflow-y: auto; padding: 12px 14px;
      font-size: 11px; font-family: monospace; color: #aaa; line-height: 1.6;
    }
    #debug-content .field { margin-bottom: 10px; }
    #debug-content .label { color: #666; font-size: 10px; text-transform: uppercase; margin-bottom: 2px; }
    #debug-content .value { color: #e0e0e0; }
    #debug-content .value.hot    { color: #f97316; }
    #debug-content .value.warm   { color: #facc15; }
    #debug-content .value.cold   { color: #60a5fa; }
    #debug-content .value.human  { color: #a78bfa; }
    #debug-content .value.new_s  { color: #aaa; }
    #debug-content .json-block {
      background: #1a1a1a; border-radius: 6px; padding: 8px;
      white-space: pre-wrap; word-break: break-all;
      border: 1px solid #222; margin-top: 4px; font-size: 10px; color: #888;
    }

    /* ─── Input Area ───────────────────────────────────────── */
    #input-area {
      padding: 14px 20px;
      border-top: 1px solid #1e1e1e;
      display: flex;
      gap: 10px;
      background: #0f0f0f;
    }

    #msg-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 24px;
      color: #f0f0f0;
      padding: 11px 18px;
      font-size: 14px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    #msg-input:focus { border-color: #00b87a; }

    #send-btn {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, #00b87a, #00d4ff);
      border: none; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    #send-btn:hover { opacity: 0.9; transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #send-btn svg { width: 20px; height: 20px; fill: #000; }

    /* ─── Quick Prompts ────────────────────────────────────── */
    #quick-prompts {
      padding: 0 20px 10px;
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .quick-btn {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px;
      color: #aaa; padding: 5px 12px; font-size: 12px; cursor: pointer;
      transition: all 0.2s; font-family: inherit;
    }
    .quick-btn:hover { border-color: #00b87a; color: #00b87a; background: #0d1f18; }

    /* ─── Typing Indicator ─────────────────────────────────── */
    .typing-indicator {
      display: flex; gap: 4px; align-items: center; padding: 10px 14px;
    }
    .typing-indicator span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #555; animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); background: #00b87a; }
    }

    /* ─── Scrollbar ────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo">RS</div>
  <div>
    <div>RootSync Bot</div>
    <div class="subtitle">واجهة اختبار — بدون واتساب</div>
  </div>
  <div class="status-dot" id="status-dot"></div>
</header>

<div id="config-panel">
  <label>Webhook URL:</label>
  <input type="text" id="webhook-url"
    value="http://localhost:3000"
    placeholder="http://localhost:3000" />
  <label>اسمك:</label>
  <input type="text" id="user-name" class="user-field" value="مستخدم تجريبي" placeholder="اسمك" />
  <button id="test-conn-btn">اختبار الاتصال</button>
  <span id="conn-result"></span>
</div>

<div class="main">
  <!-- Debug Panel (right side in RTL) -->
  <div id="debug-panel">
    <h2>📊 آخر تصنيف AI</h2>
    <div id="debug-content">
      <div style="color:#444; font-style:italic; font-size:12px;">
        أرسل رسالة لترى التصنيف هنا...
      </div>
    </div>
  </div>

  <!-- Chat Area -->
  <div id="chat-area">
    <div id="messages">
      <div class="msg-row system">
        <div class="bubble">مرحباً! هذه واجهة اختبار البوت. أرسل رسالة بالعربي وسيرد عليك الـ AI.</div>
      </div>
    </div>

    <div id="quick-prompts">
      <button class="quick-btn" onclick="fillPrompt('كيف أحجز استشارة مع الدكتور؟')">📅 حجز استشارة</button>
      <button class="quick-btn" onclick="fillPrompt('كم تكلفة البرنامج العلاجي؟')">💰 السعر</button>
      <button class="quick-btn" onclick="fillPrompt('أعاني من تعب مزمن وما قدرت أنام، شو تنصحني؟')">😴 تعب مزمن</button>
      <button class="quick-btn" onclick="fillPrompt('هل تعالجون مشاكل الهاشيموتو؟')">🏥 هاشيموتو</button>
      <button class="quick-btn" onclick="fillPrompt('شو الفرق بين مسار A ومسار B؟')">❓ معلومات</button>
    </div>

    <div id="input-area">
      <textarea id="msg-input" rows="1" placeholder="اكتب رسالتك هنا..." dir="auto"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('msg-input');
  const sendBtn     = document.getElementById('send-btn');
  const debugEl     = document.getElementById('debug-content');
  const statusDot   = document.getElementById('status-dot');
  const connResult  = document.getElementById('conn-result');

  let userId = 'ui_' + Math.random().toString(36).slice(2, 10);

  // ─── Auto-resize textarea ──────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ─── Quick prompts ─────────────────────────────────────────
  function fillPrompt(text) {
    inputEl.value = text;
    inputEl.focus();
    inputEl.dispatchEvent(new Event('input'));
  }

  // ─── Test connection ───────────────────────────────────────
  document.getElementById('test-conn-btn').addEventListener('click', async () => {
    connResult.textContent = 'جاري الاختبار...';
    connResult.style.color = '#888';
    try {
      const url = document.getElementById('webhook-url').value.trim();
      const r = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: 'ping', user_id: userId + '_test', name: 'Connection Test' })
      });
      if (r.ok || r.status === 200) {
        statusDot.classList.add('online');
        connResult.textContent = '✓ متصل';
        connResult.style.color = '#00b87a';
      } else {
        connResult.textContent = `✗ خطأ ${r.status}`;
        connResult.style.color = '#ef4444';
      }
    } catch (e) {
      connResult.textContent = '✗ لا يوجد اتصال';
      connResult.style.color = '#ef4444';
    }
  });

  // ─── Send message ──────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    const webhookUrl = document.getElementById('webhook-url').value.trim();
    const userName   = document.getElementById('user-name').value.trim() || 'مستخدم تجريبي';

    appendMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    const typingId = appendTyping();

    try {
      const res = await fetch(webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, user_id: userId, name: userName })
      });

      removeTyping(typingId);

      const rawText = await res.text();
      if (!res.ok) {
        appendMessage('bot', `⚠️ خطأ من الـ webhook (${res.status}): ${rawText.slice(0, 200)}`, null, true);
      } else {
        let data = {};
        try { data = rawText ? JSON.parse(rawText) : {}; } catch(e) { data = { reply: rawText || 'استجابة غير متوقعة من الـ AI.' }; }
        const reply = data.reply || 'لم يرجع الـ AI رداً.';
        appendMessage('bot', reply, data.classification, data.needs_human);
        updateDebugPanel(data);
        statusDot.classList.add('online');
      }
    } catch (err) {
      removeTyping(typingId);
      appendMessage('bot', `⚠️ تعذّر الاتصال بـ n8n: ${err.message}`, null, true);
      statusDot.classList.remove('online');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  // ─── DOM helpers ───────────────────────────────────────────
  function appendMessage(role, text, classification, isError) {
    const row  = document.createElement('div');
    const now  = new Date().toLocaleTimeString('ar-JO', { hour: '2-digit', minute: '2-digit' });

    if (role === 'user') {
      row.className = 'msg-row user';
      row.innerHTML = `
        <div class="avatar user-av">👤</div>
        <div class="bubble">${escHtml(text)}<div class="time">${now}</div></div>`;
    } else {
      row.className = 'msg-row bot';
      let extra = '';
      if (classification?.needs_human || isError) {
        extra = `<div class="handoff-badge">🔁 يحتاج موظف</div>`;
      }
      row.innerHTML = `
        <div class="avatar bot-av">RS</div>
        <div class="bubble" style="${isError ? 'border-color:#ef444440;color:#fca5a5' : ''}">${escHtml(text)}${extra}<div class="time">${now}</div></div>`;
    }

    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function appendTyping() {
    const id = 'typing_' + Date.now();
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = id;
    row.innerHTML = `
      <div class="avatar bot-av">RS</div>
      <div class="bubble">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>`;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    document.getElementById(id)?.remove();
  }

  function updateDebugPanel(data) {
    const c = data.classification || {};
    const statusClass = {
      hot_lead: 'hot', warm_lead: 'warm', cold_lead: 'cold',
      needs_human: 'human', new: 'new_s'
    }[c.lead_status] || '';

    debugEl.innerHTML = `
      <div class="field">
        <div class="label">Lead ID</div>
        <div class="value" style="font-size:10px;word-break:break-all">${data.lead_id || '—'}</div>
      </div>
      <div class="field">
        <div class="label">Lead Status</div>
        <div class="value ${statusClass}">${c.lead_status || '—'}</div>
      </div>
      <div class="field">
        <div class="label">Intent</div>
        <div class="value">${c.intent || '—'}</div>
      </div>
      <div class="field">
        <div class="label">Health Topic</div>
        <div class="value">${c.health_topic || '—'}</div>
      </div>
      <div class="field">
        <div class="label">Suggested Path</div>
        <div class="value">${c.suggested_path || '—'}</div>
      </div>
      <div class="field">
        <div class="label">Confidence</div>
        <div class="value">${c.confidence ? (c.confidence * 100).toFixed(0) + '%' : '—'}</div>
      </div>
      <div class="field">
        <div class="label">Needs Human</div>
        <div class="value ${data.needs_human ? 'human' : ''}">${data.needs_human ? '⚠️ نعم' : '✓ لا'}</div>
      </div>
      <div class="field">
        <div class="label">Next Action</div>
        <div class="value" style="font-size:10px">${c.recommended_next_action || '—'}</div>
      </div>
      <div class="field">
        <div class="label">Full JSON</div>
        <div class="json-block">${escHtml(JSON.stringify(c, null, 2))}</div>
      </div>`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/\n/g, '<br>');
  }
</script>
</body>
</html>
